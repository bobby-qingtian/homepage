<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A short history of moving — route map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f8f2e8;
    --surface:#fbf6ee;
    --ink:#403c37;
    --steel:#3D5A6C;
    --steel-soft:#3D5A6C33;
    --dot:#3D5A6C;       /* dotted landmass, brand steel */
    --dot-soft:#3D5A6C22;
    --mute:#8A857D;
    --land-line:#b9ad9c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding:58px 48px 72px;
    overflow-x:hidden;
  }
  .wrap{max-width:1280px;margin:0 auto}

  /* --- section header, matching About page --- */
  .eyebrow{
    font-family:"IBM Plex Mono",monospace;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--steel);margin-bottom:14px;
  }
  h1{
    font-family:"Libre Caslon Text",Georgia,serif;
    font-weight:400;font-size:42px;line-height:1.15;color:var(--ink);
    margin-bottom:10px;
  }
  .sub{
    font-size:18px;color:var(--mute);max-width:58ch;line-height:1.5;
    margin-bottom:34px;
  }

  /* --- map --- */
  .map-frame{
    position:relative;
    background:var(--surface);
    border:1px solid var(--land-line);
    border-radius:0;
    overflow:hidden;
  }
  svg{display:block;width:100%;height:auto}

  /* coastlines */
  .dot{fill:#3D5A6C;opacity:.32}

  /* meridian tick, faint, echoes the brand's vertical route hint */
  .meridian{stroke:var(--steel-soft);stroke-width:1;stroke-dasharray:2 6}

  /* the route */
  .route{
    fill:none;
    stroke:var(--steel);
    stroke-width:2.4;
    stroke-linecap:round;
    paint-order:stroke;
  }
  /* faint bone casing under the route so it reads clearly over the dot field */
  .route-casing{
    fill:none;
    stroke:var(--surface);
    stroke-width:5;
    stroke-linecap:round;
    opacity:.9;
  }
  /* draw animation applied per-segment via JS */

  .node-dot{fill:var(--steel);stroke:var(--surface);stroke-width:1.5}
  .node-ring{fill:none;stroke:var(--steel);stroke-width:1.4;opacity:.7}
  .node-label{
    font-family:"IBM Plex Mono",monospace;
    font-size:12px;letter-spacing:.08em;
    fill:var(--ink);
    text-transform:uppercase;
  }
  .node-index{
    font-family:"IBM Plex Mono",monospace;
    font-size:9px;fill:var(--mute);letter-spacing:.1em;
  }

  /* hidden until drawn */
  .node,.route{opacity:0}

  .legend{
    display:flex;gap:22px;flex-wrap:wrap;
    margin-top:20px;
    font-family:"IBM Plex Mono",monospace;
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);
  }
  .legend b{color:var(--steel);font-weight:500}

  .replay{
    margin-top:22px;
    font-family:"IBM Plex Mono",monospace;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--steel);background:none;border:1px solid var(--land-line);
    padding:9px 16px;border-radius:3px;cursor:pointer;transition:background .2s;
  }
  .replay:hover{background:var(--bg)}
  .replay:focus-visible{outline:2px solid var(--steel);outline-offset:2px}

  @media (max-width:640px){
    body{padding:34px 18px 48px}
    h1{font-size:26px}
    .node-label{font-size:10px}
  }
  @media (prefers-reduced-motion:reduce){
    .node,.route{opacity:1 !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">About · 01</div>
  <h1>A short history of moving</h1>
  <p class="sub">China, the UAE, back to China, then Brazil at ten. University across Canada, and now Melbourne. The line is the point.</p>

  <div class="map-frame">
    <!-- viewBox is an equirectangular-ish world, 1000 x 500 -->
    <svg viewBox="0 0 1000 500" role="img" aria-label="World map tracing a personal route: China, United Arab Emirates, back to China, Brazil, Canada, back to China, then Australia.">
      <!-- Simplified continent silhouettes (stylised, not survey-accurate) -->
      <g id="dots" aria-hidden="true"></g>

      <!-- faint meridian -->
      <line class="meridian" x1="500" y1="30" x2="500" y2="470" aria-hidden="true"/>

      <!-- ROUTE SEGMENTS (drawn in order) + NODES injected by JS -->
      <g id="routes" aria-hidden="true"></g>
      <g id="nodes"></g>
    </svg>
  </div>

  <div class="legend">
    <span><b>—</b> Route travelled, in order</span>
    <span><b>●</b> Places lived</span>
  </div>

  <button class="replay" id="replay" aria-label="Replay the route animation">↻ Replay route</button>
</div>

  // Nodes (dedupe visual dots at identical coords, but keep label node)
  const drawnCoords = new Set();
  const nodeEls = [];
  nodes.forEach((n,idx)=>{
    const key = n.x+','+n.y;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node');

    // only draw dot/ring once per unique coord
    if(!drawnCoords.has(key)){
      const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('class','node-ring');
      ring.setAttribute('cx',n.x); ring.setAttribute('cy',n.y); ring.setAttribute('r',9);
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('class','node-dot');
      dot.setAttribute('cx',n.x); dot.setAttribute('cy',n.y); dot.setAttribute('r',4);
      g.appendChild(ring); g.appendChild(dot);
      drawnCoords.add(key);
    }

    if(n.showLabel){
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('class','node-label');
      t.setAttribute('x', n.x + (n.dx||10));
      t.setAttribute('y', n.y + (n.dy||-12));
      t.setAttribute('text-anchor', n.anchor||'start');
      t.textContent = n.label;
      g.appendChild(t);
    }
    nodesG.appendChild(g);
    nodeEls.push(g);
  });

  // Animation: draw each segment, pop each node just before its segment.
  function prep(){
    [...segEls, ...casingEls].forEach(p=>{
      const len = p.getTotalLength();
      p.style.transition='none';
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.style.opacity = p.classList.contains('route-casing') ? .9 : 1;
    });
    nodeEls.forEach(g=>{ g.style.transition='none'; g.style.opacity=0; g.style.transform='scale(.6)'; g.style.transformOrigin='center'; });
  }

  function play(){
    const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce){
      [...segEls, ...casingEls].forEach(p=>{p.style.strokeDashoffset=0;});
      nodeEls.forEach(g=>{g.style.opacity=1;g.style.transform='none';});
      return;
    }
    prep();
    // pop first node
    let t = 250;
    const popNode = (g,delay)=>{
      setTimeout(()=>{
        g.style.transition='opacity .35s ease, transform .35s cubic-bezier(.34,1.56,.64,1)';
        g.style.opacity=1; g.style.transform='none';
      },delay);
    };
    popNode(nodeEls[0], t);
    t += 300;
    const segDur = 620;
    segEls.forEach((p,i)=>{
      const casing=casingEls[i];
      setTimeout(()=>{
        const ease=`stroke-dashoffset ${segDur}ms cubic-bezier(.65,.05,.36,1)`;
        p.style.transition=ease; casing.style.transition=ease;
        p.style.strokeDashoffset=0; casing.style.strokeDashoffset=0;
      }, t);
      popNode(nodeEls[i+1], t + segDur - 120);
      t += segDur + 90;
    });
  }

  // Play when scrolled into view (once), + replay button
  let played=false;
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting && !played){ played=true; play(); } });
  },{threshold:.4});
  io.observe(document.querySelector('.map-frame'));

  document.getElementById('replay').addEventListener('click', play);

  // ensure paths measured after fonts/layout settle
  window.addEventListener('load', ()=>{ prep(); });
})();
</script>
</body>
</html>
