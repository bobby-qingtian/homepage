document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    if (typeof window.__installDrawerInteractions === 'function') {
      window.__installDrawerInteractions();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

        const clonedPaperPath = row.querySelector('svg path');
        const clonedTabPath = row.querySelectorAll('svg path')[1];
        const sourcePaperRectAtOpen = source.querySelector('svg path').getBoundingClientRect();
        const rawTabRectAtOpen = source.querySelectorAll('svg path')[1].getBoundingClientRect();
        const sourceTabRectAtOpen = rawTabRectAtOpen.width > 1 ? rawTabRectAtOpen : sourcePaperRectAtOpen;
        if (smoothPaperPath && clonedPaperPath) clonedPaperPath.setAttribute('d', smoothPaperPath);
        // The source tab is drawn from y=6 to y=46. In the fullscreen Work view,
        // extend its coloured face from y=0 through the rule to prevent a seam.
        if (isFullPage && clonedTabPath) {
          // Cover two extra SVG units at the bottom so browser scaling cannot
          // reveal a hairline gap between the tab face and the horizontal rule.
          clonedTabPath.setAttribute('transform', 'matrix(1 0 0 1.24 0 -8.64)');
        }
        const startScale = rect.width / 1080;
        row.style.transform = `scale(${startScale})`;
        if (siteLanguage === 'zh') {
          const rowTextNodes = Array.from(row.children).filter(child => child.tagName === 'DIV');
          const rowNameNode = rowTextNodes[rowTextNodes.length - 1];
          if (rowNameNode && labels[sourceTitle]) rowNameNode.textContent = labels[sourceTitle];
        }
        if (targetContentSection) {
          Array.from(row.children)
            .filter(child => child.tagName === 'DIV')
            .forEach(node => { node.style.display = 'none'; });
        }

        const content = document.createElement('div');
        content.className = 'drawer-motion-content';
        content.style.top = `${Math.max(92, 118 * startScale)}px`;
        const close = document.createElement('button');
        close.type = 'button';
        close.className = 'drawer-motion-close';
        close.textContent = 'Close';
        let workLanguage = null;
        let sectionTab = null;
        let fullPageReady = Promise.resolve();
        if (isFullPage) {
          card.classList.add('drawer-motion-card--work');
          if (isInterests) card.classList.add('drawer-motion-card--interests');
          content.classList.add('drawer-motion-content--work');
          content.style.top = '58px';
          close.classList.add('drawer-motion-work-back');
          close.textContent = siteLanguage === 'zh' ? '档案' : 'HOME';
          const tabTitle = isAbout ? 'About' : isInterests ? 'Interests' : 'Work';
          sectionTab = document.createElement('div');
          sectionTab.className = 'drawer-motion-section-tab';
          sectionTab.dataset.title = tabTitle;
          sectionTab.textContent = siteLanguage === 'zh' && labels[tabTitle] ? labels[tabTitle] : tabTitle;
          workLanguage = document.createElement('button');
          workLanguage.className = 'homepage-language-switch drawer-motion-work-language';
          workLanguage.type = 'button';
          workLanguage.setAttribute('aria-label', 'Switch language');
          workLanguage.setAttribute('aria-pressed', String(siteLanguage === 'zh'));
          workLanguage.innerHTML = `<span class="${siteLanguage === 'zh' ? '' : 'is-active'}">EN</span><span class="${siteLanguage === 'zh' ? 'is-active' : ''}">中</span>`;
          workLanguage.addEventListener('click', () => {
            applySiteLanguage(workLanguage.getAttribute('aria-pressed') === 'true' ? 'en' : 'zh');
          });
          const workFrame = document.createElement('iframe');
          workFrame.className = 'drawer-motion-work-frame';
          workFrame.title = isAbout ? 'About' : isInterests ? 'Interests' : sourceTitle;
          fullPageReady = new Promise(resolve => {
            let isReady = false;
            const resolveReady = () => {
              if (isReady) return;
              isReady = true;
              resolve();
            };
            workFrame.addEventListener('load', () => {
            if (workFrame.contentWindow) workFrame.contentWindow.postMessage({ type:'set-language', language:siteLanguage }, '*');
            if (workFrame.contentWindow && targetSection) workFrame.contentWindow.postMessage({ type:'scroll-to', target:targetSection }, '*');
            if (workFrame.contentWindow && targetInterestsSection) workFrame.contentWindow.postMessage({ type:'focus-section', target:targetInterestsSection }, '*');
            if (!targetContentSection) {
              requestAnimationFrame(resolveReady);
              return;
            }
            requestAnimationFrame(() => {
              const frameDocument = workFrame.contentDocument;
              const target = frameDocument && frameDocument.getElementById(targetContentSection);
              if (!target) {
                resolveReady();
                return;
              }
              if (targetContentSection === 'experiences') {
                const heading = target.querySelector('.experience-intro h1');
                const anchor = heading || target;
                const frameWindow = workFrame.contentWindow;
                const anchorTop = anchor.getBoundingClientRect().top + (frameWindow ? frameWindow.scrollY : 0);
                if (frameWindow) frameWindow.scrollTo({ top:Math.max(0, anchorTop - 64), behavior:'auto' });
              } else if (targetAboutSection) {
                const frameWindow = workFrame.contentWindow;
                frameDocument.documentElement.style.scrollBehavior = 'auto';
                frameDocument.body.style.scrollBehavior = 'auto';
                const aboutSectionOffset = 72;
                const anchorAbout = () => {
                  if (!frameWindow) return;
                  const targetTop = target.getBoundingClientRect().top + frameWindow.scrollY;
                  frameWindow.scrollTo({ top:Math.max(0, targetTop - aboutSectionOffset), behavior:'auto' });
                };
                anchorAbout();
                // The page reflows ~1.5s in (CDN scripts land and shave ~245px off
                // the copy above), dragging the heading up under the tab bar.
                // Re-anchor until the height settles, yielding to the reader.
                if (frameWindow && typeof frameWindow.ResizeObserver === 'function') {
                  const observer = new frameWindow.ResizeObserver(anchorAbout);
                  observer.observe(frameDocument.documentElement);
                  const stop = () => observer.disconnect();
                  frameWindow.setTimeout(stop, 4000);
                  ['wheel', 'touchstart', 'keydown'].forEach(type => {
                    frameWindow.addEventListener(type, stop, { once:true, passive:true });
                  });
                }
              } else {
                target.scrollIntoView({ block:'start' });
              }
              resolveReady();
            });
            }, { once:true });
            if (!targetAboutSection) window.setTimeout(resolveReady, 450);
          });
          if (isWork && loadedWorkPage) workFrame.srcdoc = loadedWorkPage;
          else if (isAbout && loadedAboutPage) workFrame.srcdoc = loadedAboutPage;
          else if (isInterests && loadedInterestsPage) workFrame.srcdoc = loadedInterestsPage;
          else if (targetAboutSection) workFrame.src = `./about-page/about.html#${targetAboutSection}`;
          else workFrame.src = isAbout ? './about-page/about.html' : isInterests ? './interests-page/interests.html' : './work-page/work.html';
          content.append(workFrame);
        }
        if (isFullPage) card.append(row, content, close, ...[sectionTab, workLanguage].filter(Boolean));
        else {
          content.append(close);
          card.append(row, content);
        }
        document.body.append(overlay, card);
        document.body.classList.add('drawer-motion-lock');
        Object.assign(document.body.style, {
          position:'fixed',
          top:`-${scrollYAtOpen}px`,
          left:`-${scrollXAtOpen}px`,
          right:'0',
          width:'100%'
        });
        if (isFullPage) gsap.set([card, content], { autoAlpha:0 });
        else gsap.set(source, { autoAlpha:0 });

        if (isFullPage) {
          await fullPageReady;
          if (active) return;
          gsap.set(source, { autoAlpha:0 });
          gsap.set([card, content], { autoAlpha:1 });
          if (clonedPaperPath) gsap.set(clonedPaperPath, { opacity:0 });
        }

        const finish = () => {
          if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
          overlay.remove();
          card.remove();
          gsap.set(source, { clearProps:'opacity,visibility' });
          document.body.classList.remove('drawer-motion-lock');
          Object.assign(document.body.style, bodyStyleAtOpen);
          active = null;
          if (!isFullPage) source.focus({ preventScroll:true });
          const restoreScroll = () => window.scrollTo(scrollXAtOpen, scrollYAtOpen);
          restoreScroll();
          requestAnimationFrame(() => {
            restoreScroll();
            requestAnimationFrame(restoreScroll);
          });
          window.setTimeout(restoreScroll, 50);
          window.setTimeout(restoreScroll, 150);
          window.setTimeout(restoreScroll, 300);
        };

        overlay.addEventListener('click', closeDrawerCard);
        close.addEventListener('click', closeDrawerCard);

        if (reducedMotion) {
          const fit = Math.min(1, innerWidth * .82 / rect.width, innerHeight * .78 / paperHeight);
          gsap.set(card, isFullPage ? {
            x:getWorkViewportLeft() - rect.left,
            y:-rect.top,
            width:getWorkViewportWidth(),
            height:innerHeight,
            borderRadius:0,
            borderWidth:0,
            clipPath:'inset(0 0 0px 0)'
          } : {
            x:(innerWidth - rect.width * fit) / 2 - rect.left,
            y:(innerHeight - paperHeight * fit) / 2 - rect.top,
            scale:fit,
            clipPath:'inset(0 0 0px 0)'
          });
          if (isFullPage) gsap.set(content, { left:0, right:0, top:58, bottom:0, borderRadius:0, borderWidth:0 });
          if (isFullPage && clonedPaperPath) gsap.set(clonedPaperPath, { opacity:0 });
          gsap.set([overlay, content], { autoAlpha:1 });
          active = { source, overlay, card, content, finish, closing:false, isWork:isFullPage, originRect:rect };
          close.focus({ preventScroll:true });
          return;
        }

        const pullDistance = isFullPage ? Math.max(0, rect.top) : Math.max(80, paperHeight - visibleHeight + 18);
        const fit = Math.min(1, innerWidth * .82 / rect.width, innerHeight * .78 / paperHeight);
        const targetX = isFullPage ? getWorkViewportLeft() - rect.left : (innerWidth - rect.width * fit) / 2 - rect.left;
        const targetY = isFullPage ? -rect.top : (innerHeight - paperHeight * fit) / 2 - rect.top;
        const tilt = rect.left + rect.width / 2 < innerWidth / 2 ? -1.1 : 1.1;
        const timeline = gsap.timeline({
          defaults:{ overwrite:'auto' },
          onComplete:() => close.focus({ preventScroll:true }),
          onReverseComplete:finish
        });
        timeline
          .to(overlay, { autoAlpha:1, duration:.55, ease:'power1.out' }, .25)
          .to(card, { rotationZ:tilt, duration:.2, ease:'power1.out' }, 0)
          .to(card, {
            y:-pullDistance,
            clipPath:'inset(0 0 0px 0)',
            duration:1.05,
            ease:'power2.inOut'
          }, .08)
          .to(card, {
            x:targetX,
            y:targetY,
            scale:isFullPage ? 1 : fit,
            width:isFullPage ? getWorkViewportWidth() : rect.width,
            height:isFullPage ? innerHeight : paperHeight,
            borderRadius:isFullPage ? 0 : 10,
            borderWidth:isFullPage ? 0 : 1.6,
            rotationZ:0,
            duration:.72,
            ease:'power3.inOut'
          }, '>-0.06')
          .to(content, isFullPage ? {
            left:0,
            right:0,
            top:58,
            bottom:0,
            borderRadius:0,
            borderWidth:0,
            duration:.72,
            ease:'power3.inOut'
          } : {}, '<')
          .to(clonedPaperPath, isFullPage ? { opacity:0, duration:.2, ease:'power1.out' } : {}, '<.5')
          .to(content, { autoAlpha:1, duration:isFullPage ? 0 : .3, ease:'power1.out' }, isFullPage ? 0 : '>-0.2');
        const returnToSource = () => {
          const topTabs = card.querySelectorAll('.drawer-motion-work-back, .drawer-motion-section-tab');
          const isMobileDrawer = matchMedia('(max-width:700px)').matches;
          // Aim the sheet at its own paper slot so it re-inserts centered and
          // exactly as wide as the drawer stack below.
          const insertionRect = sourcePaperRectAtOpen;
          const paperScale = Math.min(isMobileDrawer ? 1 : .94, insertionRect.width / rect.width);
          const scaledPaperHeight = paperHeight * paperScale;
          const insertionY = sourceTabRectAtOpen.top + visibleHeight;
          const centeredLeft = insertionRect.left + (insertionRect.width - rect.width * paperScale) / 2;
          const floatTop = insertionY - scaledPaperHeight;
          const finalTop = sourceTabRectAtOpen.top;
          const scaleInsetX = rect.width * (1 - paperScale) / 2;
          const scaleInsetY = paperHeight * (1 - paperScale) / 2;
          const floatX = centeredLeft - rect.left - scaleInsetX;
          const floatY = floatTop - rect.top - scaleInsetY;
          const finalY = finalTop - rect.top - scaleInsetY;
          const closedClip = `inset(0 0 ${paperHeight - visibleHeight / paperScale}px 0)`;

          const returnTimeline = gsap.timeline({ defaults:{ overwrite:'auto' }, onComplete:finish });
          returnTimeline
            // Turn the full-screen view into a proportionally smaller sheet.
            .to(card, {
              x:floatX,
              y:floatY,
              width:rect.width,
              height:paperHeight,
              scale:paperScale,
              rotationZ:0,
              borderRadius:10,
              borderWidth:1.6,
              borderColor:'#87A1BA',
              backgroundColor:'transparent',
              clipPath:'inset(0 0 0px 0)',
              duration:.78,
              ease:'power3.inOut'
            })
            .to(content, {
              left:'4%', right:'4%', top:Math.max(48, 54 * startScale), bottom:'4%',
              borderRadius:10, borderWidth:1.5,
              duration:.78, ease:'power3.inOut'
            }, '<');
          if (topTabs.length) returnTimeline.to(topTabs, { autoAlpha:0, duration:.18, ease:'power1.out' }, '<.48');
          returnTimeline
            .to(clonedPaperPath, isFullPage ? { opacity:0, duration:.2, ease:'power1.out' } : { opacity:1, duration:.2, ease:'power1.out' }, topTabs.length ? '<' : '<.48')
            // Feed the sheet downward from its bottom edge into its source slot.
            .to(card, {
              y:finalY,
              clipPath:closedClip,
              duration:1.05,
              ease:'power2.inOut'
            })
            .to(overlay, { autoAlpha:0, duration:.55, ease:'power1.out' }, '<.42');
        };

        active = { source, overlay, card, content, timeline, finish, returnToSource, closing:false, isWork:isFullPage, originRect:rect };
      }

      // ---- Guide overlay: entry layer shown before the drawer -----------
      let guideActive = null;
      const getGuideRow = () => document.querySelector('[data-screen-label="Index drawer"] a[title="Welcome"]');
      const getDrawerStack = () => document.querySelector('[data-screen-label="Index drawer"]');

      // Keep clear of the fixed corner nav (language switch / LinkedIn / Email)
      // on desktop; on narrow screens fall back to a near-full-width sheet.
      function guideCardMetrics() {
        const compact = innerWidth < 700;
        const cardW = compact ? innerWidth * .92 : Math.min(1240, innerWidth - 300);
        const cardH = compact
          ? Math.max(320, Math.round(innerHeight * .68))
          : Math.min(680, Math.max(320, innerHeight - 96));
        const cardTop = Math.max(0, (innerHeight - cardH) / 2);
        const cardLeft = Math.max(0, (innerWidth - cardW) / 2);
        return { cardW, cardTop, cardH, cardLeft, startScale: cardW / 1080 };
      }

      // Same insertion math as returnToSource: aim the sheet at the guide
      // row's paper slot so it feeds downward into the drawer front tab.
      function guideGeometry(source, cardLeft, cardTop, cardW, cardH) {
        const sourceRect = source.getBoundingClientRect();
        const paperRect = source.querySelector('svg path').getBoundingClientRect();
        const rawTabRect = source.querySelectorAll('svg path')[1].getBoundingClientRect();
        const tabRect = rawTabRect.width > 1 ? rawTabRect : paperRect;
        const visibleHeight = Math.min(sourceRect.height, 92);
        const isMobileDrawer = matchMedia('(max-width:700px)').matches;
        const paperScale = Math.min(isMobileDrawer ? 1 : .94, paperRect.width / cardW);
        const scaleInsetX = cardW * (1 - paperScale) / 2;
        const scaleInsetY = cardH * (1 - paperScale) / 2;
        const centeredLeft = paperRect.left + (paperRect.width - cardW * paperScale) / 2;
        return {
          paperScale,
          floatX: centeredLeft - cardLeft - scaleInsetX,
          floatY: (tabRect.top + visibleHeight - cardH * paperScale) - cardTop - scaleInsetY,
          finalY: tabRect.top - cardTop - scaleInsetY,
          closedClip: `inset(0 0 ${Math.max(0, cardH - visibleHeight / paperScale)}px 0)`
        };
      }

      function openGuide({ fromTab = false } = {}) {
        if (guideActive || active) return;
        const source = getGuideRow();
        if (!source) return;
        source.style.animation = 'none';

        const { cardW, cardTop, cardH, cardLeft, startScale } = guideCardMetrics();

        const overlay = document.createElement('div');
        overlay.className = 'drawer-motion-overlay';
        overlay.setAttribute('aria-hidden', 'true');

        const card = document.createElement('article');
        card.className = 'drawer-motion-card guide-card';
        card.setAttribute('role', 'dialog');
        card.setAttribute('aria-modal', 'true');
        card.setAttribute('aria-label', 'Welcome');
        Object.assign(card.style, {
          left:`${cardLeft}px`, top:`${cardTop}px`, width:`${cardW}px`, height:`${cardH}px`
        });

        const row = source.cloneNode(true);
        row.className = 'drawer-motion-row';
        row.removeAttribute('href');
        row.removeAttribute('style-hover');
        const smoothPaperPath = source.getAttribute('data-paper-path');
        const clonedPaperPath = row.querySelector('svg path');
        if (smoothPaperPath && clonedPaperPath) clonedPaperPath.setAttribute('d', smoothPaperPath);
        row.style.setProperty('top', `${-46 * startScale}px`, 'important');
        row.style.transform = `scale(${startScale})`;

        const content = document.createElement('div');
        content.className = 'drawer-motion-content guide-card-body';
        content.style.top = `${Math.max(92, 118 * startScale)}px`;
        content.innerHTML = `
          <h1 class="guide-title" data-guide-text data-en="Welcome to Bobby&rsquo;s Archive, what brings you here?" data-zh="欢迎来到 Bobby 的档案馆，你为何而来？"></h1>
          <div class="guide-options">
            <button type="button" class="guide-option" data-guide-target="About" data-guide-text data-en="About" data-zh="关于"></button>
            <button type="button" class="guide-option" data-guide-target="Work" data-guide-text data-en="Work" data-zh="作品"></button>
            <button type="button" class="guide-option" data-guide-target="Interests" data-guide-text data-en="Interests" data-zh="兴趣"></button>
          </div>
          <button type="button" class="guide-everything" data-guide-target="">
            <span class="guide-everything-arrow" aria-hidden="true"><img src="./assets/arrow-right.svg" alt=""></span>
            <span data-guide-text data-en="Everything" data-zh="全部"></span>
          </button>`;
        const chinese = siteLanguage === 'zh';
        content.querySelectorAll('[data-guide-text]').forEach(node => {
          node.textContent = chinese ? node.dataset.zh : node.dataset.en;
        });

        card.append(row, content);
        document.body.append(overlay, card);
        document.body.classList.add('drawer-motion-lock', 'guide-open');
        gsap.set(source, { autoAlpha:0 });
        if (clonedPaperPath) gsap.set(clonedPaperPath, { opacity:0 });

        guideActive = { source, overlay, card, content, cardLeft, cardTop, cardW, cardH, timeline:null, closing:false };

        content.addEventListener('click', event => {
          const button = event.target.closest('[data-guide-target]');
          if (!button) return;
          closeGuide(button.dataset.guideTarget || null);
        });
        overlay.addEventListener('click', () => closeGuide(null));

        const drawerStack = getDrawerStack();
        if (reducedMotion) {
          if (drawerStack) gsap.set(drawerStack, { autoAlpha:0 });
          gsap.set([overlay, content], { autoAlpha:1 });
          return;
        }
        const timeline = gsap.timeline({ defaults:{ overwrite:'auto' } });
        guideActive.timeline = timeline;
        if (fromTab) {
          // Pull the guide sheet out of its drawer tab, mirroring openDrawerCard.
          const geometry = guideGeometry(source, cardLeft, cardTop, cardW, cardH);
          gsap.set(card, { x:geometry.floatX, y:geometry.finalY, scale:geometry.paperScale, clipPath:geometry.closedClip });
          timeline
            .to(overlay, { autoAlpha:1, duration:.55, ease:'power1.out' }, .15)
            .to(card, { y:geometry.floatY, clipPath:'inset(-60px 0 0px 0)', duration:.95, ease:'power2.inOut' }, 0)
            .to(card, { x:0, y:0, scale:1, duration:.7, ease:'power3.inOut' }, '>-0.05')
            .to(content, { autoAlpha:1, duration:.3, ease:'power1.out' }, '>-0.15');
          // The drawer fades away once the sheet is fully pulled out.
          if (drawerStack) timeline.to(drawerStack, { autoAlpha:0, duration:.45, ease:'power1.out' }, .75);
        } else {
          if (drawerStack) gsap.set(drawerStack, { autoAlpha:0 });
          gsap.set(card, { y:26, autoAlpha:0 });
          timeline
            .to(overlay, { autoAlpha:1, duration:.5, ease:'power1.out' }, 0)
            .to(card, { y:0, autoAlpha:1, duration:.6, ease:'power2.out' }, .05)
            .to(content, { autoAlpha:1, duration:.35, ease:'power1.out' }, '>-0.25');
        }
      }

      function syncGuideViewport() {
        if (!guideActive || guideActive.closing || innerWidth <= 0 || innerHeight <= 0) return;
        const { cardW, cardTop, cardH, cardLeft, startScale } = guideCardMetrics();
        Object.assign(guideActive, { cardLeft, cardTop, cardW, cardH });
        Object.assign(guideActive.card.style, {
          left:`${cardLeft}px`, top:`${cardTop}px`, width:`${cardW}px`, height:`${cardH}px`
        });
        const guideRow = guideActive.card.querySelector('.drawer-motion-row');
        if (guideRow) {
          guideRow.style.setProperty('top', `${-46 * startScale}px`, 'important');
          guideRow.style.transform = `scale(${startScale})`;
        }
        guideActive.content.style.top = `${Math.max(92, 118 * startScale)}px`;
      }

      function closeGuide(nextTitle) {
        if (!guideActive || guideActive.closing) return;
        guideActive.closing = true;
        const guide = guideActive;
        if (guide.timeline) guide.timeline.kill();
        const drawerStack = getDrawerStack();
        const proceed = () => {
          guide.overlay.remove();
          guide.card.remove();
          gsap.set(guide.source, { clearProps:'opacity,visibility' });
          if (drawerStack) gsap.set(drawerStack, { clearProps:'opacity,visibility' });
          document.body.classList.remove('drawer-motion-lock', 'guide-open');
          guideActive = null;
          if (!nextTitle) return;
          const target = document.querySelector(`[data-screen-label="Index drawer"] a[title="${nextTitle}"]`);
          if (target) target.click();
        };
        if (reducedMotion) { proceed(); return; }
        const geometry = guideGeometry(guide.source, guide.cardLeft, guide.cardTop, guide.cardW, guide.cardH);
        const clonedPaperPath = guide.card.querySelector('svg path');
        const timeline = gsap.timeline({ defaults:{ overwrite:'auto' }, onComplete: proceed });
        timeline
          // The drawer reappears beneath the sheet as it heads back in...
          .to(drawerStack || {}, drawerStack ? { autoAlpha:1, duration:.5, ease:'power1.out' } : {}, .2)
          // ...while the sheet shrinks to drawer width above its slot...
          .to(guide.content, { autoAlpha:0, duration:.3, ease:'power1.out' }, 0)
          .to(guide.card, { x:geometry.floatX, y:geometry.floatY, scale:geometry.paperScale, duration:.72, ease:'power3.inOut' }, 0)
          .to(clonedPaperPath, { opacity:1, duration:.25, ease:'power1.out' }, '<.4')
          // ...then feed it downward into the front tab of the drawer.
          .to(guide.card, { y:geometry.finalY, clipPath:geometry.closedClip, duration:1, ease:'power2.inOut' })
          .to(guide.overlay, { autoAlpha:0, duration:.5, ease:'power1.out' }, '<.4');
      }

      document.addEventListener('click', event => {
        const target = event.target instanceof Element ? event.target : event.target.parentElement;
        const source = target && target.closest('[data-screen-label="Index drawer"] a');
        if (!source) return;
        if (!(source.getAttribute('title') || '').trim()) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        if ((source.getAttribute('title') || '').trim() === 'Welcome') {
          openGuide({ fromTab:true });
          return;
        }
        openDrawerCard(event, source);
      }, true);
      document.addEventListener('keydown', event => {
        if (event.key !== 'Escape') return;
        if (guideActive) closeGuide(null);
        else closeDrawerCard();
      });
      syncDrawerViewport();
      window.addEventListener('resize', syncDrawerViewport);
      window.addEventListener('resize', syncActiveWorkViewport);
      window.addEventListener('resize', syncGuideViewport);

      (function initGuideEntry() {
        if (guideActive || active) return;
        if (getGuideRow() && innerWidth > 0 && innerHeight > 0) {
          openGuide();
          return;
        }
        window.setTimeout(initGuideEntry, 120);
      })();
    };
  </script>
</body>
</html>
